syntax = "proto3";

package mqtt.router;

message AuthenticateNodeRequest {
  string server_id = 1;
  string token = 2;
  uint64 timestamp_ms = 3;
  string nonce = 4;
  string host = 5;
  uint32 port = 6;
  uint32 forwarding_port = 7;
}

message AuthenticateNodeResponse {
  int32 error_code = 1;
  string error_message = 2;
  string session_id = 3;
  uint64 expires_at_ms = 4;
}

message SubscribeRequest {
  string server_id = 1;
  string client_id = 2;
  string topic_filter = 3;
  uint32 qos = 4;
}

message SubscribeResponse {
  int32 error_code = 1;
  string error_message = 2;
}

message UnsubscribeRequest {
  string server_id = 1;
  string client_id = 2;
  string topic_filter = 3;
}

message UnsubscribeResponse {
  int32 error_code = 1;
  string error_message = 2;
}

message ClientConnectRequest {
  string server_id = 1;
  string client_id = 2;
  string username = 3;
  uint32 protocol_version = 4;
  uint32 keep_alive = 5;
  bool clean_session = 6;
}

message ClientConnectResponse {
  int32 error_code = 1;
  string error_message = 2;
}

message ClientDisconnectRequest {
  string server_id = 1;
  string client_id = 2;
  string disconnect_reason = 3;
}

message ClientDisconnectResponse {
  int32 error_code = 1;
  string error_message = 2;
}

message RoutePublishRequest {
  string topic = 1;
  bytes payload = 2;
  uint32 qos = 3;
  bool retain = 4;
  string publisher_server_id = 5;
  string publisher_client_id = 6;
  uint64 message_id = 7;
  string trace_id = 8;
}

message RouteTarget {
  string server_id = 1;
  string client_id = 2;
  string host = 3;
  uint32 port = 4;
  uint32 forwarding_port = 5;
  uint32 qos = 6;
}

message RoutePublishResponse {
  int32 error_code = 1;
  string error_message = 2;
  repeated RouteTarget targets = 3;
}

message GetStatisticsRequest {
}

message GetStatisticsResponse {
  int32 error_code = 1;
  string error_message = 2;
  uint64 total_servers = 3;
  uint64 total_clients = 4;
  uint64 total_subscriptions = 5;
  uint64 total_routes = 6;
  uint64 memory_usage_bytes = 7;
  uint64 redo_log_entries = 8;
  uint64 last_snapshot_time = 9;
}

message HeartbeatRequest {
  string server_id = 1;
  string session_id = 2;
  string host = 3;
  uint32 port = 4;
  uint32 forwarding_port = 5;
  uint64 client_count = 6;
  uint64 subscription_count = 7;
}

message HeartbeatResponse {
  int32 error_code = 1;
  string error_message = 2;
  uint64 current_time = 3;
}

message RouterEnvelope {
  uint64 request_id = 1;
  oneof body {
    AuthenticateNodeRequest authenticate_node_request = 10;
    AuthenticateNodeResponse authenticate_node_response = 11;
    SubscribeRequest subscribe_request = 12;
    SubscribeResponse subscribe_response = 13;
    UnsubscribeRequest unsubscribe_request = 14;
    UnsubscribeResponse unsubscribe_response = 15;
    ClientConnectRequest client_connect_request = 16;
    ClientConnectResponse client_connect_response = 17;
    ClientDisconnectRequest client_disconnect_request = 18;
    ClientDisconnectResponse client_disconnect_response = 19;
    RoutePublishRequest route_publish_request = 20;
    RoutePublishResponse route_publish_response = 21;
    GetStatisticsRequest get_statistics_request = 22;
    GetStatisticsResponse get_statistics_response = 23;
    HeartbeatRequest heartbeat_request = 24;
    HeartbeatResponse heartbeat_response = 25;
  }
}
