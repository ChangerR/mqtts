# MQTT服务器配置文件
# 服务器配置
server:
  bind_address: "0.0.0.0"  # 绑定地址
  port: 1883  # 监听端口
  max_connections: 10000  # 最大连接数
  backlog: 128  # socket backlog
  thread_count: 2  # 线程数

# MQTT协议配置
mqtt:
  max_packet_size: 1048576  # 最大包大小(字节)
  keep_alive_default: 60  # 默认保活时间(秒)
  keep_alive_max: 3600  # 最大保活时间(秒)
  max_qos: 2  # 最大QoS级别
  retain_available: true  # 支持retain消息
  wildcard_subscription_available: true  # 支持通配符订阅
  subscription_identifier_available: true  # 支持订阅标识符
  shared_subscription_available: false  # 支持共享订阅
  topic_alias_maximum: 65535  # 主题别名最大值
  receive_maximum: 65535  # 接收最大值
  allow_mqtt3x: true  # 允许 MQTT 3.1 / 3.1.1 客户端

# 内存配置
memory:
  client_max_size: 1048576  # 客户端最大内存大小(字节)

# WebSocket服务器配置
# 注意：当前版本通过 server.port 处理 MQTT + WebSocket(HTTP Upgrade)。
# 下列 websocket 配置为兼容预留项，端口映射建议将宿主机 18080 转发到容器 1883。
websocket:
  enabled: true  # 是否启用WebSocket服务器
  bind_address: "127.0.0.1"  # 绑定地址
  port: 18080  # 监听端口
  max_connections: 10000  # 最大连接数
  thread_count: 2  # 线程数
  backlog: 128  # socket backlog
  max_frame_size: 1048576  # 最大帧大小(字节)
  max_message_size: 10485760  # 最大消息大小(字节)
  handshake_timeout: 10  # 握手超时时间(秒)
  ping_interval: 30  # Ping间隔(秒)
  pong_timeout: 10  # Pong超时时间(秒)
  message_format: "mqtt_packet"  # 消息格式: json, mqtt_packet, text_protocol

# 日志配置
log:
  level: "debug"  # 日志级别: trace, debug, info, warn, error, critical
  file_path: "logs/mqtt.log"  # 日志文件路径，空字符串输出到控制台
  max_file_size: 10485760  # 日志文件最大大小(字节)
  max_files: 10  # 最大日志文件数量
  flush_immediately: false  # 立即刷新 

monitoring:
  enabled: true  # 是否启用监控
  interval_seconds: 60  # 监控数据收集间隔(秒) 
  json_output_file: "monitoring_data.json"  # 监控数据输出文件路径，空字符串不输出到文件
